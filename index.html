<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Digital Labs MCP Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 60px 24px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 640px; text-align: center; }
    h1 { color: #0009DC; font-size: 2rem; margin-bottom: 4px; }
    h2 { font-weight: 400; font-size: 1.25rem; margin-bottom: 32px; color: #999; }
    p { margin-bottom: 16px; line-height: 1.6; }
    code {
      background: #1a1a2e;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #7b8cff;
      word-break: break-all;
    }
    a { color: #0009DC; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      background: #0009DC22;
      color: #7b8cff;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Digital Labs</h1>
    <h2>MCP Server</h2>
    <div class="badge">Model Context Protocol</div>
    <p>Connect via <strong>Claude Desktop &rarr; Settings &rarr; Connectors</strong></p>
    <p>Endpoint:<br><code>https://mcp.apps.aidigitallabs.com/mcp?key=YOUR_API_KEY</code></p>
    <p style="margin-top: 32px;">
      <a href="https://developers.apps.aidigitallabs.com">Full Documentation &rarr;</a>
    </p>
  </div>
</body>
</html>
